<!DOCTYPE html>
<html>
<head>
  <title>Love Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #ffe6f0;
    }
    .container {
      margin-top: 50px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
    }
    button {
      background: #ff4d88;
      color: white;
      border: none;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      color: #ff0066;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Love Calculator ❤️</h1>
    <input type="text" id="name1" placeholder="Enter first name">
    <input type="text" id="name2" placeholder="Enter second name">
    <br>
    <button onclick="calculateLove()">Calculate</button>
    <div id="result"></div>
  </div>

  <script>
    function calculateLove() {
      const name1 = document.getElementById("name1").value;
      const name2 = document.getElementById("name2").value;

      if (!name1 || !name2) {
        document.getElementById("result").innerText = "Please enter both names!";
        return;
      }

      // Fake compatibility score
      const score = Math.floor(Math.random() * 101);

      document.getElementById("result").innerText =
        `Compatibility between ${name1} and ${name2} is ${score}% 💕`;
    }
  </script>
</body>
</html>
